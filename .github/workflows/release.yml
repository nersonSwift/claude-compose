name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build binary
        run: make

      - name: Build .deb package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="claude-compose_${VERSION}"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"

          cp claude-compose "${PKG_DIR}/usr/bin/claude-compose"
          chmod +x "${PKG_DIR}/usr/bin/claude-compose"

          printf '%s\n' \
            "Package: claude-compose" \
            "Version: ${VERSION}" \
            "Section: utils" \
            "Priority: optional" \
            "Architecture: all" \
            "Depends: jq" \
            "Maintainer: Aleksandr Senin" \
            "Description: Multi-project workspace launcher for Claude Code" \
            " Merges MCP servers, permissions, skills, and CLAUDE.md" \
            " from external projects into a single Claude Code session." \
            > "${PKG_DIR}/DEBIAN/control"

          dpkg-deb --build "${PKG_DIR}" "claude-compose.deb"

      - name: Compute SHA256
        id: sha
        run: |
          TMP_TARBALL=$(mktemp)
          curl -fsL "https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" -o "$TMP_TARBALL"
          SHA=$(sha256sum "$TMP_TARBALL" | cut -d' ' -f1)
          rm -f "$TMP_TARBALL"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "SHA256 for Homebrew formula: ${SHA}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            claude-compose
            claude-compose.deb
          append_body: true
          body: |
            ## Install

            **Homebrew:**
            ```bash
            brew install nersonSwift/tap/claude-compose
            ```

            **apt/dpkg:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/claude-compose.deb -o /tmp/claude-compose.deb
            sudo dpkg -i /tmp/claude-compose.deb
            ```

            **Script:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ---
            SHA256 (tar.gz): `${{ steps.sha.outputs.sha256 }}`

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set, skipping tap update"
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::warning::Unexpected version format '${VERSION}', skipping tap update"
            exit 0
          fi
          SHA256="${{ steps.sha.outputs.sha256 }}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/nersonSwift/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i \
            -e "s|url \".*\"|url \"https://github.com/nersonSwift/claude-compose/archive/refs/tags/v${VERSION}.tar.gz\"|" \
            -e "s|sha256 \"[^\"]*\"|sha256 \"${SHA256}\"|" \
            Formula/claude-compose.rb

          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add Formula/claude-compose.rb
          git diff --cached --quiet && echo "No changes to formula" && exit 0
          git commit -m "Update claude-compose to v${VERSION}"
          git push origin main || echo "::warning::Failed to push tap update"
